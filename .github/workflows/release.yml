name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.2.0 or v0.3.0b0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag is required" >&2
            exit 1
          fi

          if [[ "${tag}" =~ b[0-9]+$ ]]; then
            prerelease=true
            cliff_args="--latest --strip header --verbose"
          else
            prerelease=false
            cliff_args="--latest --strip header --verbose --tag-pattern '^v[0-9]+\\.[0-9]+\\.[0-9]+$'"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "cliff_args=${cliff_args}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.meta.outputs.cliff_args }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.git-cliff.outputs.changelog }}
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: false
